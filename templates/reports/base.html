<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Quiz Report{% endblock %}</title>
    {% if use_flask_assets %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/report.css') }}">
    {% else %}
    <style>
        {% include 'reports/inline_styles.html' %}
    </style>
    {% endif %}
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
